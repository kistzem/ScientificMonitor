ility, improved accuracy, and eliminating the need for online nonlinear coarse-grid solves and coefficient evaluations. Numerical results show that ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25820v1", "pdf": "https://arxiv.org/pdf/2606.25820v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"We present an operator learning framework based on a coarse data-driven multiscale space for nonlinear flow in random heterogeneous porous media\"."}, {"id": "arxiv:2606.25776v1", "title": "Approaching the Quantum Limit of Optical Rotatory Dispersion: From First-Principles to Single-Photon Monochromators", "authors": ["Xianglun Ma", "Junyan Zhu", "Fang Lu"], "abstract": "Optical rotatory dispersion (ORD) in chiral media, classically demonstrated as the \"sweet monochromator,\" provides a robust mechanism for liquid-tunable spectral filtering. However, the ultimate physical boundaries governing its spectral bandwidth remain fundamentally unexplored beyond classical electromagnetic theory. Here, we present a comprehensive framework bridging macroscopic optical filtering with the quantum electrodynamic (QED) limits of chiral light-matter interaction. Using time-dependent density functional theory (TD-DFT) combined with Boltzmann conformational averaging, we accurately compute the ORD curves of representative saccharide systems, revealing that the theoretical minimum bandwidth is intrinsically tied to the anomalous dispersion (Cotton effect) near the molecular a", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25776v1", "pdf": "https://arxiv.org/pdf/2606.25776v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Optical rotatory dispersion (ORD) in chiral media, classically demonstrated as the \"sweet monochromator,\" provides a robust mechanism for liquid-tunable spectra\"."}, {"id": "arxiv:2606.25725v1", "title": "Deep Learning-Assisted Multicast Subgrouping in Massive MIMO", "authors": ["Alejandro de la Fuente", "Leopoldo Carro-Calvo", "Giovanni Interdonato"], "abstract": "Efficient content delivery in massive multiple-input multiple-output (mMIMO) multicasting is fundamentally limited by pilot overhead and the need to serve heterogeneous users with a common transmission rate. Conventional approaches either suffer from pilot contamination or are constrained by the worst-user effect, motivating the need for adaptive subgrouping strategies. In this paper, we propose a deep learning-assisted multicast subgrouping framework that infers the number of multicast subgroups directly from users' spatial channel statistics. A snapshot-specific principal component analysis (PCA) is applied to user covariance matrices to obtain a compact representation, which is processed by a sequential long short-term memory (LSTM) encoder capable of handling variable-size user sets. T", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25725v1", "pdf": "https://arxiv.org/pdf/2606.25725v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Efficient content delivery in massive multiple-input multiple-output (mMIMO) multicasting is fundamentally limited by pilot overhead and the need to serve heter\"."}, {"id": "arxiv:2606.25710v1", "title": "Mechanical control of the height distribution of adsorbed viral capsids", "authors": ["Yeraldinne Carrasco Salas", "Kassandra Gérard", "Lauriane Lecoq", "Anna Salvetti", "Fabien Montel", "Cendrine Faivre-Moskalenko"], "abstract": "The height of viral particles adsorbed on solid substrates is governed by the equilibrium between adhesion energy and capsid elasticity. While the resulting height distribution has been proposed as a non-invasive proxy for viral sti$\\hookleftarrow$ness, the physical origin of its broadening is unknown. In this work, we combine Atomic Force Microscopy (AFM) topography measurements of Adeno-Associated Virus (AAV8) and Hepatitis B Virus (HBV) with a theoretical shell-deformation model to identify the determinants of height dispersion. By modeling the viral shell as an elastic body under adhesive load, we evaluate the relative contributions of thermal fluctuations and mechanical heterogeneity to the observed height dispersion. We demonstrate that thermal noise is insu cient to explain the widt", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25710v1", "pdf": "https://arxiv.org/pdf/2606.25710v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"We demonstrate that thermal noise is insu cient to explain the widt\"."}, {"id": "arxiv:2606.25693v1", "title": "Dynamic Load Balancing for Uncertainty Quantification with Applications in Bayesian Inversion", "authors": ["C. M. Loi", "M. Wille", "A. Reinarz"], "abstract": "Uncertainty Quantification (UQ) workflows present a particular scheduling challenge in high performance computing environments, as they typically generate large numbers of heterogeneous model evaluations with loose but non-trivial dependencies between tasks. A static one-size-fits-all approach in traditional schedulers is inadequate to handle heterogeneous tasks optimally. We introduce an improved load balancer in the UQ and Modelling Bridge (UM-Bridge) framework aimed at mitigating these issues; UM-Bridge is a language-agnostic interface developed to couple UQ software with numerical simulation. As a realistic example, we test the load balancer with a Bayesian inverse problem solved via multilevel delayed acceptance sampling. The underlying forward problem is a hierarchy of tsunami simula", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25693v1", "pdf": "https://arxiv.org/pdf/2606.25693v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Uncertainty Quantification (UQ) workflows present a particular scheduling challenge in high performance computing environments, as they typically generate large\"."}, {"id": "arxiv:2606.25686v1", "title": "Unveiling the Trans-Neptunian Region with the SKA", "authors": ["Pablo Santos-Sanz", "Yücel Kilic", "Thomas G. Müller", "Emmanuel Lellouch", "Javier Moldón", "Jorma Harju"], "abstract": "We explore the potential of the SKA staged delivery AA4 (SKA-AA4) to detect and characterise the thermal emission of trans-Neptunian objects (TNOs) and Centaurs at centimetre wavelengths. These distant icy bodies preserve important information on the formation and evolution of the outer Solar System and provide a valuable link to planetary systems observed around other stars. The unprecedented sensitivity of SKA-AA4 will enable thermal detections of several of the brightest TNOs and Centaurs, extending radiometric studies beyond the capabilities of current radio facilities. Combined with shorter-wavelength observations and occultation measurements, these data will provide new constraints on spectral emissivity behaviour, thermophysical properties, and subsurface structure. At its highest a", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25686v1", "pdf": "https://arxiv.org/pdf/2606.25686v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"We explore the potential of the SKA staged delivery AA4 (SKA-AA4) to detect and characterise the thermal emission of trans-Neptunian objects (TNOs) and Centaurs\"."}, {"id": "arxiv:2606.25665v1", "title": "Learning Subset-Shared Invariances for Domain Generalization with Mixture-of-Experts", "authors": ["Tien-Hung Nguyen", "Tien-Dat Tran", "M. -Duong Nguyen", "Kok-Seng Wong"], "abstract": "Domain generalization (DG) aims to learn a model from one or more source domains that generalizes to an unseen target domain without accessing target data during training. A common approach enforces invariance of representations across all source domains, assuming predictive structure is globally shared. However, we demonstrate that enforcing invariance across more domains gradually restricts the feasible representation space, discarding transferable predictive factors that are not universally shared. To address this limitation, we propose subset-shared invariance, where predictive structure is assumed stable only within domain subsets. We implement this principle with a mixture-of-experts architecture, where each expert aligns the specific domains it serves and a routing mechanism compose", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25665v1", "pdf": "https://arxiv.org/pdf/2606.25665v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"we demonstrate that enforcing invariance across more domains gradually restricts the feasible representation space, discarding transferable predictive factors that are not universa\"."}, {"id": "arxiv:2606.26075v1", "title": "Glossy Silicate Clouds on the Scorched Dayside of LTT9779b", "authors": ["Suman Saha", "James S. Jenkins", "Jonathan Brande", "Reza Ashtari", "Ian J. M. Crossfield", "Sarah Stamer"], "abstract": "Discovered deep within the \"Neptunian desert\", LTT9779b remains the only known ultra-hot Neptune, prompting significant speculation regarding its unique formation and evolutionary history. Its exceptionally high geometric albedo has previously been attributed either to the presence of clouds or to an extremely metal-rich atmosphere. Here, we present a comprehensive panchromatic analysis of its dayside atmosphere using JWST NIRISS and NIRSpec/G395H observations to characterize its atmospheric structure and composition. Leveraging the exceptional signal-to-noise ratio (S/N) in the observed spectra, we report a 3-to-5$σ$ detection of dayside clouds, with strong evidence for Mg$_2$SiO$_4$(s) (silicate) condensation. This constitutes the first statistically significant detection of clouds on th", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26075v1", "pdf": "https://arxiv.org/pdf/2606.26075v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": true, "summary_he": "מחקר זה עוסק בחלקיקי סיליקה תוך שימוש במדידות ותצפיות. מהממצאים: \"we report a 3-to-5$σ$ detection of dayside clouds, with strong evidence for Mg$_2$SiO$_4$(s) (silicate) condensation\". ⚠️ רלוונטי ישירות לStardust."}, {"id": "arxiv:2606.25995v1", "title": "The evolution of the galaxy gas-phase mass-metallicity relation from $z=15$ to $z=0$ in the COLIBRE cosmological simulations", "authors": ["Piyush Sharda", "Joop Schaye", "Robert J. McGibbon", "Alejandro Benítez-Llambay", "Evgenii Chaikin", "Carlos S. Frenk"], "abstract": "We present the evolution of the galaxy gas-phase mass-metallicity relation (MZR) from $z=15$ to $z=0$ in the COLIBRE cosmological hydrodynamical simulations. Amongst other novel features, COLIBRE follows the multiphase interstellar medium with gas allowed to cool to $\\sim 10\\,\\mathrm{K}$, and includes a new chemistry model in which hydrogen and helium are tracked in non-equilibrium, metals are allowed to mix and diffuse, and the chemical network is coupled to a self-consistent live dust model. Using fiducial COLIBRE runs spanning particle masses from $10^5\\,\\mathrm{M_{\\odot}}$ to $10^7\\,\\mathrm{M_{\\odot}}$ and box sizes $25 - 400\\,\\mathrm{cMpc}$, we derive the median, mass-weighted MZRs for star-forming galaxies and compare them with a comprehensive compilation of observational data and ot", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25995v1", "pdf": "https://arxiv.org/pdf/2606.25995v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"We present the evolution of the galaxy gas-phase mass-metallicity relation (MZR) from $z=15$ to $z=0$ in the COLIBRE cosmological hydrodynamical simulations\"."}, {"id": "arxiv:2606.25937v1", "title": "Event-Aware Loss Design for Forecasting of Convective Precipitation and Lightning", "authors": ["ChangJae Lee", "Heecheol Yang", "Byeonggwon Kim"], "abstract": "Accurate forecasting of high-impact weather, specifically extreme precipitation and lightning, remains a significant challenge in numerical weather prediction (NWP) due to the complexity of atmospheric microphysics. While deep-learning models have shown promise in large-scale forecasting, they often suffer from systematic under-prediction of rare, high-intensity events and localized convective showers when optimized with conventional loss functions like Mean Squared Error (MSE). This study proposes an Event-Aware multi-task deep-learning post-processing framework designed to improve the representation of convective processes by leveraging lightning observations. The model jointly predicts precipitation amount, rainfall probability, and lightning occurrence using a shared-backbone Patch-cGA", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25937v1", "pdf": "https://arxiv.org/pdf/2606.25937v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Accurate forecasting of high-impact weather, specifically extreme precipitation and lightning, remains a significant challenge in numerical weather prediction (\"."}, {"id": "arxiv:2606.25818v1", "title": "Shift Variant Image Degradation and Restoration Using Singular Value Decomposition", "authors": ["Arun D. Kulkarni"], "abstract": "Shift-variant image degradation is frequently encountered in practical imaging systems where the point spread function (PSF) varies across the image field due to motion, optical aberrations, atmospheric turbulence, or sensor-related effects. Unlike shift-invariant, shift-variant degradation presents significant challenges for image restoration because the degradation process cannot be represented by a single convolution kernel. This paper proposes a singular value decomposition (SVD)-based framework for restoring images degraded by shift-variant motion blur. The proposed approach determines the contribution of small singular values using a singular-value energy retention criterion. Specifically, the number of small singular values is selected based on a specified percentage of cumulative s", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25818v1", "pdf": "https://arxiv.org/pdf/2606.25818v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Shift-variant image degradation is frequently encountered in practical imaging systems where the point spread function (PSF) varies across the image field due t\"."}, {"id": "arxiv:2606.25774v1", "title": "Category Theoretic Framework for Chemistry I: a Tower of Chemistry", "authors": ["Kyunghoon Han"], "abstract": "Many laws of chemistry are exact within a limited scope and acquire a separate caveat outside it, and the caveats are usually treated as unrelated. This work argues that they share one cause. Each caveat marks a point where a question is asked of a description too coarse to answer it: the question belongs to a richer level of structure than the description carries. To make these levels explicit, the paper builds a tower of categories over the free symmetric monoidal category of a Petri net, the simplest categorical presentation of a reaction network. The levels, from the bottom up, are stoichiometry, thermochemistry, equilibrium, reaction kinetics, reaction mechanism, molecular geometry, and electronic structure. Each adds one kind of chemical content over the level below, and a forgetful ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25774v1", "pdf": "https://arxiv.org/pdf/2606.25774v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Many laws of chemistry are exact within a limited scope and acquire a separate caveat outside it, and the caveats are usually treated as unrelated\"."}, {"id": "arxiv:2606.25675v1", "title": "Changes in Pluto's Atmosphere Based on Stellar Occultation Data from 2017 to 2023", "authors": ["Amanda A. Sickafoose", "Michael J. Person", "Carlos A. Zuluaga", "Amanda S. Bosh", "Stephen E. Levine", "Tim Brothers"], "abstract": "Pluto's tenuous atmosphere has $μ$bar-level pressure and is composed primarily of ${\\text{N}}_2$, with a variable haze. Its eccentric orbit combined with high obliquity leads to significant changes in solar insolation throughout the Plutonian year. The atmosphere is supported by vapor-pressure equilibrium with the surface ices, thus surface changes are coupled with the atmospheric properties. Volatile-transport models have anticipated Pluto's atmospheric evolution: predictions range from collapse over the coming decades to an atmosphere that remains. Previous work claims that Pluto's atmospheric pressure monotonically increased from 1988 through 2016, that the atmosphere began freezing out in 2018-2019, and that there was a plateau as of 2020. Here, we report results from ten stellar occul", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25675v1", "pdf": "https://arxiv.org/pdf/2606.25675v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"we report results from ten stellar occul\"."}, {"id": "arxiv:2606.25667v1", "title": "Multi-thermal dynamics and transverse oscillations of solar spicules revealed by coordinated SST, IRIS, and SDO observations", "authors": ["Ravi Chaurasiya", "Tiago M. D. Pereira", "A. Raja Bayanna"], "abstract": "% context heading (optional) {Solar spicules are highly dynamic chromospheric jets that play an important role in the mass and energy balance of the solar atmosphere, though their connection to the transition region and corona remains unclear.} % aims heading (mandatory) {We investigate the dynamical and multi-thermal properties of spicules, their connection to higher atmospheric layers, and their transverse oscillations and associated energy flux.} % methods heading (mandatory) {We analyse coordinated high-resolution observations from the Swedish 1-m Solar Telescope (SST) in H$α$, the Interface Region Imaging Spectrograph (IRIS) in \\ion{Si}{iv} 1400~Å, and the Solar Dynamics Observatory (SDO)/Atmospheric Imaging Assembly (AIA) coronal channels. Space-time diagrams, spectral analysis, and ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25667v1", "pdf": "https://arxiv.org/pdf/2606.25667v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"% context heading (optional) {Solar spicules are highly dynamic chromospheric jets that play an important role in the mass and energy balance of the solar atmos\"."}, {"id": "arxiv:2606.25617v1", "title": "Valence-change-driven reduction of antiphase boundaries in spinel ferrite epitaxial films", "authors": ["Kouki Takeo", "Eiji Kita", "Hideto Yanagihara"], "abstract": "Antiphase boundaries (APBs) formed in thin films sometimes cause severe degradation of their physical properties. In particular, a high density of APBs in spinel ferrite films generates a non-negligible magnetic dead layer near the interface. In this study, we examined the effect of post-oxidation annealing in an oxygen plasma atmosphere on Co$_{0.125}$Fe$_{2.875}$O$_4$(001) thin films grown on MgO(001) as a model system. The thickness of the magnetic dead layer was found to be significantly reduced after post-oxidation, resulting in an increase in the saturation magnetization and an improved squareness ratio. Dark-field transmission electron microscopy analysis revealed that the post-oxidation process increased the antiphase domain size, indicating a substantial reduction in APB density. ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25617v1", "pdf": "https://arxiv.org/pdf/2606.25617v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Antiphase boundaries (APBs) formed in thin films sometimes cause severe degradation of their physical properties\"."}, {"id": "arxiv:2606.25557v1", "title": "A topology-tuned pressure valve across the isoreticular RHO zeolite family", "authors": ["Salvador R. G. Balestra", "Antonio Rivas-Blanco", "Said Hamad", "A. Rabdel Ruiz-Salvador"], "abstract": "The isoreticular index of the eight-member embedded RHO zeolite hierarchy operates as a phenomenological design knob that tunes the mechanical critical pressure of the framework valve from $\\sim 0.94$ GPa for parent RHO down to a predicted $\\lesssim 0.03$ GPa for the largest member PST-28, more than an order of magnitude lower across a single family of synthesizable nanoporous solids. The molecular-valve effect that defines zeolite RHO (a reversible centric-to-acentric phase transition triggered by water, gas pressure, or mechanical loading) is shown here to be not a peculiarity of the smallest member but a generic property of the whole hierarchy, with a critical pressure that decays exponentially with the isoreticular order $k$. Combining lattice dynamics, full elastic-constant tensors, a", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25557v1", "pdf": "https://arxiv.org/pdf/2606.25557v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"The isoreticular index of the eight-member embedded RHO zeolite hierarchy operates as a phenomenological design knob that tunes the mechanical critical pressure\"."}, {"id": "arxiv:2606.25443v1", "title": "Exploring Activity Across the Stellar Main Sequence with the Sun as a Benchmark", "authors": ["Atul Mohan", "Stephen M. White", "Sven Wedemeyer", "Vladimir Airapetian"], "abstract": "The active atmospheres of cool main-sequence stars (F-M type) often release a fraction of their stored magnetic energy, producing enhanced emissions (flares) across radio to X-ray wavelengths and associated space weather events like coronal mass ejections (CMEs) and energetic particle events (EPEs). Detailed imaging of active regions and CMEs, and in-situ EPE measurements are possible only in our Sun, making it a benchmark for stellar activity research. Multiwaveband solar imaging datasets let us define robust disk-integrated Sun-as-a-star diagnostics of active region and space weather, extendable to stellar datasets. Radio waveband provide diagnostics of particle acceleration, CMEs and EPEs, essential to model flare events and their space weather impacts. The Square Kilometre Array (SKA) ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25443v1", "pdf": "https://arxiv.org/pdf/2606.25443v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The active atmospheres of cool main-sequence stars (F-M type) often release a fraction of their stored magnetic energy, producing enhanced emissions (flares) ac\"."}, {"id": "arxiv:2606.25417v1", "title": "Evaluation of medium range machine learning models for sub-seasonal prediction", "authors": ["Catherine de Burgh-Day", "Chen Li", "Debra Hudson", "Li Shi", "Harrison Cook", "Robin Wedd"], "abstract": "The performance of two machine learning (ML) atmosphere models - GraphCast and FourCastNetV2 - is evaluated in the context of sub-seasonal prediction, including their ability to represent key climate drivers of variability, namely the Madden-Julian Oscillation and the Southern Annular Mode. Model skill is assessed over both a 38-year hindcast period and a 2.5-year hindcast period. The longer period overlaps with the training windows of the ML models but provides a larger sample for robust evaluation, while the shorter period is independent of the ML model training period. This dual evaluation illustrates a compromise approach to the problem of insufficient independent data for evaluation of the models for sub-seasonal prediction. The ML models are compared against the Bureau of Meteorology", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25417v1", "pdf": "https://arxiv.org/pdf/2606.25417v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The performance of two machine learning (ML) atmosphere models - GraphCast and FourCastNetV2 - is evaluated in the context of sub-seasonal prediction, including\"."}, {"id": "arxiv:2606.25377v1", "title": "A Detailed Model Atmosphere Analysis of Cool White Dwarfs in DESI DR1", "authors": ["Mukremin Kilic", "Pierre Bergeron", "Simon Blouin", "Adam Moss", "Matthew J. Green", "Gracyn Jewett"], "abstract": "We present a detailed model atmosphere analysis of cool white dwarfs in the Dark Energy Spectroscopic Instrument Data Release 1 (DESI DR1). Our sample includes 25,642 unique targets with $G_{\\rm BP}-G_{\\rm RP}>0$. Unlike the hot DA white dwarf sample in DESI DR1, we do not find a significant discrepancy between the photometric and spectroscopic masses for cool DAs. Hence, DESI's calibration problems for broad lines have a negligible effect for cooler DAs with narrower lines. Magnetic DAs are found everywhere, and not just on the crystallization sequence, indicating that crystallization induced dynamos cannot solely explain the origin of magnetism in white dwarfs. A detailed analysis of cool DC and DZ white dwarfs indicates that the H/He abundance ratio in He-atmosphere white dwarfs increas", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25377v1", "pdf": "https://arxiv.org/pdf/2606.25377v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"We present a detailed model atmosphere analysis of cool white dwarfs in the Dark Energy Spectroscopic Instrument Data Release 1 (DESI DR1)\"."}, {"id": "arxiv:2606.25282v1", "title": "Sustainable photocatalytic CO2 conversion using microalgae as a carbon-negative scavenger", "authors": ["Ho Truong Nam Hai", "Augusto Ducati Luchessi", "Makoto Arita", "Qixin Guo", "Kaveh Edalati"], "abstract": "Photocatalytic CO2 conversion driven by solar energy is a highly promising approach in addressing rising atmospheric CO2 levels; however, its practical application remains limited by low conversion efficiency. In this study, a new strategy to enhance CO2 reduction toward CO and CH4 is proposed through the employment of microalgae as a sacrificial agent, and the efficiency is compared with conventional CO2 conversion without and with the use of microplastics as sacrificial agents. To realize this strategy, an AB2O6-type high-entropy oxide (HEO), (Cs1/7Ba4/7Bi2/7)(Nb1/2Ta1/2)2O6, with bi-polymorphy of layered perovskite and pyrochlore, is rationally designed. The HEO incorporates alkali metal cesium and alkaline earth metal barium to increase surface basicity for CO2 chemisorption, bismuth w", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25282v1", "pdf": "https://arxiv.org/pdf/2606.25282v1", "citations": 0, "source": "arXiv", "query": "all:atmospheric chemistry aerosol ozone stratosphere", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Photocatalytic CO2 conversion driven by solar energy is a highly promising approach in addressing rising atmospheric CO2 levels; however, its practical applicat\"."}, {"id": "arxiv:2606.26044v1", "title": "Jets and Outflows in Young Stellar Objects with the SKAO", "authors": ["Giovanni Sabatini", "Gemma Busquet", "Carlos Carrasco-González", "Adriana Rodríguez-Kamenetzky", "Codella Claudio", "Linda Podio"], "abstract": "Jets and outflows are ubiquitous phenomena associated with the formation of young stellar objects (YSOs). They play a crucial role in removing angular momentum from the accreting system and in regulating star-formation efficiency. Theoretical studies and observations with ALMA and VLA have shown that jets and winds may have a crucial role in promoting dust growth in the envelope-disc system and in shaping the physical and chemical properties of the surrounding environment. Despite these significant advances, many fundamental questions remain unanswered regarding the acceleration, collimation, and chemical impact of jets and outflows from YSOs. The SKA-project will overcome the limitations of current mm/cm-facilities by enabling high-angular resolution and high-sensitivity cm-observations, ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26044v1", "pdf": "https://arxiv.org/pdf/2606.26044v1", "citations": 0, "source": "arXiv", "query": "all:solar radiation management", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Jets and outflows are ubiquitous phenomena associated with the formation of young stellar objects (YSOs)\"."}, {"id": "arxiv:2606.26039v1", "title": "In-medium QCD splittings beyond the soft, large-$N_c$ and harmonic-oscillator approximations all at once", "authors": ["Marco Leitão", "José Guilherme Milhano", "Alba Soto-Ontoso"], "abstract": "Nearly thirty years ago, Baier, Dokshitzer, Mueller, Peigné, Schiff, and Zakharov (BDMPS-Z) introduced a formalism to calculate the fully differential probability for a high-energy quark or gluon to radiate inside a finite-volume QCD plasma. We report on the first, complete numerical solution to the BDMPS-Z equations for in-medium QCD splittings. Our numerical routines are precise across phase-space, enabling a determination of the in-medium splitting functions that is significantly beyond the state-of-the-art, including finite-energy effects, subleading-color contributions, and a realistic model for parton-medium interactions. We quantify the uncertainties associated with standard approximations in the literature, revealing substantial deviations across phase-space. This work opens a path", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26039v1", "pdf": "https://arxiv.org/pdf/2606.26039v1", "citations": 0, "source": "arXiv", "query": "all:solar radiation management", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"We report on the first, complete numerical solution to the BDMPS-Z equations for in-medium QCD splittings\"."}, {"id": "arxiv:2606.26031v1", "title": "Geometrically convex return risk measures on AM-algebras", "authors": ["Christian Laudagé"], "abstract": "Monetary risk measures quantify the risk of uncertain monetary payoffs (or losses), whereas in time series analysis risk is typically assessed using logarithmic returns. Return risk measures (RRMs) provide an axiomatic foundation for this latter approach, which relies crucially on the positive cone of the space of essentially bounded random variables. We extend RRMs to general ordered vector spaces and characterize positive homogeneity via the geometric epigraph. To investigate geometric convexity and establish connections with monetary risk measures, we specialize the domain to AM-algebras, encompassing Euclidean spaces and spaces of multidimensional essentially bounded random variables. The latter is novel in the context of RRMs and leads to the new classes of systemic and vector-valued ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26031v1", "pdf": "https://arxiv.org/pdf/2606.26031v1", "citations": 0, "source": "arXiv", "query": "all:solar radiation management", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Monetary risk measures quantify the risk of uncertain monetary payoffs (or losses), whereas in time series analysis risk is typically assessed using logarithmic\"."}, {"id": "arxiv:2606.26026v1", "title": "Can giant impacts be directly detected in other star systems?", "authors": ["Pavan Tanna", "Simon Lock", "Amy Bonsor", "Simon Hodgkin", "Cathie. J. Clarke"], "abstract": "Giant impacts, collisions between planet-sized bodies, play an important role in planet and moon formation. As we enter a new era of large-scale surveys, such as \\textit{Gaia} and LSST at the Vera C. Rubin observatory, there is potential to directly observe the remnants produced in such events and gain insights into the process of planet formation. Here, by modelling the emission and cooling of a series of giant impact remnants, we show that giant impacts are detectable as a sudden brightening followed by gradual dimming in the optical and near-infrared. Giant impacts between Earth-composition planets were simulated using the smoothed particle  "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"As advanced nuclear reactors demand novel irradiation-tolerant materials, this study investigates the radiation damage and mechanical degradation of the promisi\"."}, {"id": "arxiv:2606.25944v1", "title": "Dispersion Suppression for Wedge-Based Final Cooling at a 10 TeV Muon Collider", "authors": ["Inci Karaaslan", "Karri DiPetrillo", "David Neuffer", "Diktys Stratakis", "Katsuya Yonehara"], "abstract": "Achieving a luminosity of $\\gtrsim 10^{34} cm^{-2} s^{-1}$ in a $10 \\text{ } TeV$ Muon Collider, given the short lifetime of a muon, requires reducing the 6D emittance of the muon beam through a process known as ionization cooling. In the final stage of this cooling process, the transverse emittance must be reduced to $22 \\text{ } μm$, typically by allowing longitudinal emittance growth up to downstream acceptance limits. While the current International Muon Collider Collaboration designs involve $40 \\text{ } T$ solenoids to reach the transverse emittance target, such high-field solenoids come with several challenges, including mechanical stress management, quench protection, and potential limitations in relying on High Temperature Superconductor technology. Designed as an alternative to u", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25944v1", "pdf": "https://arxiv.org/pdf/2606.25944v1", "citations": 0, "source": "arXiv", "query": "all:solar radiation management", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Achieving a luminosity of $\\gtrsim 10^{34} cm^{-2} s^{-1}$ in a $10 \\text{ } TeV$ Muon Collider, given the short lifetime of a muon, requires reducing the 6D em\"."}, {"id": "arxiv:2606.25902v1", "title": "Count data modeling and forecasting of malaria incidence using generalized time series regression", "authors": ["Adithya B. Somaraj", "Praveen D. Chougale", "Usha Ananthakumar", "Karthika M. Satyanarayanan"], "abstract": "Malaria remains a major public health concern in many urban regions of India, where timely prediction of malaria incidence is essential for effective surveillance and resource allocation. This study examines count data approaches for understanding and predicting malaria incidence in the Mumbai region. The analysis used monthly $\\textit{Plasmodium vivax}$ surveillance data from the Health Management Information System (HMIS) collected between 2012 and 2019, together with meteorological variables. Initial Poisson regression models suggested strong associations between malaria incidence and environmental factors; however, diagnostic assessment revealed substantial overdispersion, indicating that the Poisson model did not adequately capture the data's variability. Negative binomial regression ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25902v1", "pdf": "https://arxiv.org/pdf/2606.25902v1", "citations": 0, "source": "arXiv", "query": "all:solar radiation management", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Malaria remains a major public health concern in many urban regions of India, where timely prediction of malaria incidence is essential for effective surveillan\"."}, {"id": "arxiv:2606.25896v1", "title": "Two years of shock interaction tracing three phases of evolution: the explosion of a Type IIn supernova, SN 2019vxm", "authors": ["Gitika Rameshan", "Rishabh Singh Teja", "D. K. Sahu", "G. C. Anupama", "Masayuki Yamanaka", "Keiichi Maeda"], "abstract": "We present multi-wavelength photometric and optical spectroscopic observations of the long-lived interacting supernova SN 2019vxm, spanning more than two years after the explosion. SN 2019vxm is a slowly rising (rise time ~ 45.9 days in the R-band), slowly declining supernova reaching an R-band peak absolute magnitude of ~-20.3 mag. The SN light curve post-maximum shows a shallow decline, followed by a secondary, steeper decline in the optical (0.01 mag/day), with late-time IR brightening. The total radiated luminosity is 5x10^50 erg, placing it among the energetic class of its type. We estimated a CSM mass of 3-8 M_sun through light-curve modeling (independent of the CSM density profile) and by comparison with theoretical models. We estimate a minimum ejecta mass of ~ 3.88 M_sun from the ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25896v1", "pdf": "https://arxiv.org/pdf/2606.25896v1", "citations": 0, "source": "arXiv", "query": "all:solar radiation management", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"We present multi-wavelength photometric and optical spectroscopic observations of the long-lived interacting supernova SN 2019vxm, spanning more than two years \"."}, {"id": "arxiv:2606.25845v1", "title": "Probing Kinematic Anisotropies in the Stochastic Gravitational Wave Background with the SKA", "authors": ["N. M. J. Cruz", "Ameek Malhotra", "Gianmassimo Tasinato", "Ivonne Zavala"], "abstract": "Pulsar Timing Arrays (PTAs) and astrometric surveys provide complementary probes of the nanohertz stochastic gravitational-wave background (SGWB). A primary target is the kinematic dipole induced by the Solar System's motion, whose detection would confirm the SGWB's cosmological origin. We forecast the sensitivity of the Square Kilometre Array Observatory (SKAO) using optimal estimators and Fisher techniques, considering both the baseline AA4 configuration and an optimistic 1000 pulsar scenario, including the potential gain from combining with Gaia-like astrometry. While SKAO will substantially improve constraints on SGWB anisotropies, even let _f='all';
const $=id=>document.getElementById(id),sc=s=>s>=8?'#27ae60':s>=5?'#f39c12':'#95a5a6';
function init(){
  const wk=new Date();wk.setDate(wk.getDate()-7);const wkStr=wk.toISOString().slice(0,10);
  const alerts=ALL.filter(p=>p.priority==='red');
  const sd=ALL.filter(p=>p.stardust);
  const rn=ALL.filter(p=>p.status==='researcher').length;
  const cn=ALL.filter(p=>p.status==='competition').length;
  $('cnt-all').textContent=ALL.length;
  $('cnt-alert').textContent=alerts.length;
  $('cnt-week').textContent=ALL.filter(p=>p.date>=wkStr).length;
  $('cnt-stardust').textContent=sd.length;
  if(rn){$('bdg-res').textContent=rn;$('bdg-res').style.display='';}
  if(cn){$('bdg-comp').textContent=cn;$('bdg-comp').style.display='';}
  if(sd.length){$('bdg-sd').textContent=sd.length;$('bdg-sd').style.display='';}
  $('bdg-all').textContent=ALL.length;$('bdg-all').style.display='';
  if(alerts.length){
    const ban=$('banner');
    ban.innerHTML='🔴 <b>התראות מיידיות:</b> '+alerts.slice(0,4).map(p=>
      `<a href="${p.url}" target="_blank" style="color:#ffa0a0;font-weight:700">${p.matched||''}</a>: ${(p.title||'').slice(0,55)}...`
    ).join(' | ');
    ban.classList.add('show');
  }
  render();
}
function sw(val,btn){
  _f=val;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}
function render(){
  const q=($('search').value||'').toLowerCase();
  const ms=parseInt($('filter-score').value||0);
  let pp=ALL.filter(p=>{
    if(_f==='stardust'&&!p.stardust)return false;
    else if(_f!=='all'&&_f!=='stardust'&&p.status!==_f)return false;
    if(p.score<ms)return false;
    if(!q)return true;
    return((p.title||'')+(p.authors||[]).join(' ')+(p.abstract||'')).toLowerCase().includes(q);
  });
  pp.sort((a,b)=>{
    if(a.priority==='red'&&b.priority!=='red')return -1;
    if(b.priority==='red'&&a.priority!=='red')return 1;
    if(b.score!==a.score)return b.score-a.score;
    return(b.date||'')>(a.date||'')?1:-1;
  });
  if(!pp.length){$('cards').innerHTML='<div class="empty">אין תוצאות</div>';return;}
  $('cards').innerHTML=pp.map(p=>{
    const cc=p.status==='researcher'?'card researcher':p.status==='competition'?'card competition':p.stardust?'card stardust':'card';
    const sch=p.status==='researcher'?`<span class="chip chip-red">🔴 ${p.matched}</span>`:
              p.status==='competition'?`<span class="chip chip-orange">🟠 ${p.matched}</span>`:
              `<span class="chip chip-gray">🟡 כללי</span>`;
    const jch=p.journal&&p.journal!=='arXiv'?`<span class="chip chip-blue">📰 ${p.journal.slice(0,28)}</span>`:
              `<span class="chip chip-green">📄 arXiv</span>`;
    const stch=p.stardust?`<span class="chip chip-purple">⚠️ Stardust</span>`:'';
    const auth=(p.authors||[]).slice(0,4).join(', ')+(p.authors&&p.authors.length>4?` +${p.authors.length-4}`:'');
    const pdfb=p.pdf?`<a href="${p.pdf}" target="_blank" class="btn btn-green">PDF</a>`:'';
    const smc=p.priority==='red'?'card-summary alert':'card-summary';
    return`<div class="${cc}">
      <div class="card-top">
        <a class="card-title" href="${p.url}" target="_blank">${p.title||'ללא כותרת'}</a>
        <div class="score" style="background:${sc(p.score)}" title="ציון ${p.score}/10">${p.score}</div>
      </div>
      <div class="card-meta">${sch} ${jch} ${stch}
        <span class="chip chip-gray">📅 ${p.date||'?'}</span>
        ${p.citations>0?`<span class="chip chip-gray">🔗 ${p.citations} ציטוטים</span>`:''}
        <span style="color:#6b8099">${auth}</span>
      </div>
      <div class="${smc}">${p.summary_he||''}</div>
      <div class="card-btns">
        <a href="${p.url}" target="_blank" class="btn btn-blue">קרא מאמר</a>
        ${pdfb}
      </div>
    </div>`;
  }).join('');
}
async function doRefresh(){
  const btn=$('refresh-btn'),st=$('st');
  btn.disabled=true;btn.textContent='⏳ מריץ...';st.textContent='';
  try{
    const r=await fetch(`http://localhost:$5759/refresh`,{method:'POST'});
    const d=await r.json();
    if(d.error==='כבר רץ'){st.textContent='⏳ כבר רץ...';}
    else if(d.status==='started'){
      st.textContent='⏳ מחפש...';
      const iv=setInterval(async()=>{
        try{
          const s=await(await fetch(`http://localhost:$5759/status`)).json();
          if(!s.running){clearInterval(iv);setTimeout(()=>location.reload(),1000);}
          else st.textContent='⏳'+((s.output||[]).slice(-1)[0]||'');
        }catch{}
      },2000);
    }
  }catch{st.textContent='❌ שגיאת חיבור';btn.disabled=false;btn.textContent='🔄 עדכן עכשיו';}
}
init();
</script>
