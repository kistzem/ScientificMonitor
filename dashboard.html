gy distributions, and including an explicit nulling fraction. We find that approximately half of the pulsars req", "date": "2026-06-09", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.10807v1", "pdf": "https://arxiv.org/pdf/2606.10807v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "researcher", "matched": "David Keith", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת David Keith — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"We find that approximately half of the pulsars req\"."}, {"id": "arxiv:2606.11497v1", "title": "Graded identities of the first Weyl algebra and its generalizations", "authors": ["V. Futorny", "P. Koshlukov", "J. Schwarz"], "abstract": "We study the graded polynomial identities of the first Weyl algebra $W_1$ over an infinite field. The algebra $W_1$ satisfies no ordinary polynomial identities in characteristic 0. It admits a natural grading by the infinite cyclic group $\\mathbb{Z}$. We construct a basis of the $\\mathbb{Z}$-graded identities of $W_1$, which consists of a single identity. It expresses the fact that the degree 0 component in the grading is commutative. It is also well known that if the characteristic of the base field is $p>2$, then $W_1$ satisfies the same identities as the full matrix algebra of order $p$. In this situation, we describe the $\\mathbb{Z}_p$-graded identities of $W_1$. Afterwards, using various combinatorial and algebraic tools we consider graded identities for various types of algebras gene", "date": "2026-06-09", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.11497v1", "pdf": "https://arxiv.org/pdf/2606.11497v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסו itical for spoken dialogue, cascaded architectures are often bottlenecked by reactive turn-completion detection. We propose Endpoint Anticipation, shifting from reactive detection to proactive forecasting of end-of-turn signals. Our speech-based model anticipates endpoints upto 2.56 seconds in advance, enabling speculative execution of LLM and TTS pipelines on partial context. We introduce metrics to quantify the trade-off between realized latency reduction and computational redundancy. Evaluation across conversational and task-oriented datasets shows our model consistently outperforms competitive VAP-based baselines. Integration with the Unmute framework demonstrates a 505 ms average latency reduction with a 28.4% increase in speculative computation, eff", "date": "2026-06-11", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.13450v1", "pdf": "https://arxiv.org/pdf/2606.13450v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"While low-latency interaction is critical for spoken dialogue, cascaded architectures are often bottlenecked by reactive turn-completion detection\"."}, {"id": "arxiv:2606.13093v1", "title": "Equilibrium Computation in Extensive-Form Games with Stochastic Action Sets", "authors": ["Thomas Schwarz", "Ryann Sim", "Chun Kai Ling"], "abstract": "Extensive-form games (EFGs) are a standard model for sequential decision-making in games. A fundamental and typically implicit assumption in EFGs is that players always have access to all of their actions at every decision point. However, in many realistic settings, certain actions might be unavailable during game-play due to exogenous stochasticity, hindering the expressivity of the standard EFG model. Given a `base' EFG, we formalize a model that allows for actions to be stochastically restricted, leading to a corresponding Extensive-Form Games with Stochastic Action Sets (EFGSAS). In EFGSAS, we derive an expansion procedure that results in an equivalent EFG, thus showing that standard strategy formalisms could require exponentially-large representations. However, under an appropriate in", "date": "2026-06-11", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.13093v1", "pdf": "https://arxiv.org/pdf/2606.13093v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Extensive-form games (EFGs) are a standard model for sequential decision-making in games\"."}, {"id": "arxiv:2606.14891v1", "title": "CVXPY 1.9: Recent Advances in Optimization Modeling Software", "authors": ["William Zhang", "Parth Nobel", "Aryaman Jeendgar", "Riley Murray", "Philipp Schiele", "Steven Diamond"], "abstract": "CVXPY is a Python-embedded domain-specific language for convex optimization that lets users express problems in mathematical notation while the system verifies convexity and reduces valid programs to solver-ready form. This paper reports on the major advances from versions 1.1 through 1.9. These include a unified conic quadratic program (CQP) standard form for canonicalization; a stacked-slices backend that accelerates parameterized programs; first-class support for N-dimensional expressions; explicit sparsity for variables; support for multiple variable attributes; cones/atoms relevant to quantum information theory; and the introduction of disciplined nonlinear programming (DNLP). We outline the design, algorithms, and modeling consequences of these features.", "date": "2026-06-12", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.14891v1", "pdf": "https://arxiv.org/pdf/260 ar metallicities over phase space in galactic disks is sculpted by both star formation and secular orbital transport processes\"."}, {"id": "arxiv:2606.14448v1", "title": "Generalized Framework for a Fair Comparison of Cellular and Cooperative Massive MIMO Systems", "authors": ["Leonard Paul Schulz", "Stefan Schwarz", "Gerhard Bauch"], "abstract": "Cooperative massive multiple-input multiple-output (MIMO) promises large gains over cellular deployments, but existing comparisons of different architectures often mix antenna distribution, inter-site coordination, and processing assumptions. This paper introduces a graph-based framework for fair comparison of cellular, coordinated, and cell-free massive-MIMO systems. We differentiate between two key properties, namely antenna distribution and inter-site cooperation, which yields seven representative system types. We derive compatible uplink and downlink spectral efficiency (SE) expressions, including an uplink bound for detectors with mixed instantaneous and statistical effective channel state information (CSI), and adapt scalable user association and processing rules to all considered ar", "date": "2026-06-12", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.14448v1", "pdf": "https://arxiv.org/pdf/2606.14448v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Cooperative massive multiple-input multiple-output (MIMO) promises large gains over cellular deployments, but existing comparisons of different architectures of\"."}, {"id": "arxiv:2606.17033v1", "title": "Milestoning Markov-jump dynamics: Stationary properties, thermodynamic consistency, kinetic hysteresis, and fluctuation symmetries", "authors": ["Tassilo Schwarz", "David Hartich", "Aljaž Godec"], "abstract": "We derive an exa e Language Models with Persistent Homology", "authors": ["Naman Malhotra", "Jay Ambadkar", "Abhinav Gupta", "Kushal Kasivel", "Abbas Schwarz", "Kamillo Ferry"], "abstract": "Large language models are commonly aligned through supervised fine-tuning, yet little is known about how their internal representations evolve during this process. We study alignment dynamics using persistent homology by tracking the topology of activation spaces throughout fine-tuning. Across four transformer language models ranging from 1B to 7B parameters and three alignment objectives corresponding to helpful, harmless, and mixed training data, we find that the majority of topological reorganization occurs during the earliest stages of training. A dense checkpoint analysis reveals a transient peak in topological activity followed by rapid stabilization. We further show that different alignment objectives induce distinguishable topological trajectories, while instruction-tuned and pretr", "date": "2026-06-17", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.19542v1", "pdf": "https://arxiv.org/pdf/2606.19542v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"we find that the majority of topological reorganization occurs during the earliest stages of training\"."}, {"id": "arxiv:2606.19427v1", "title": "Physics-guided discovery of dynamical dark-energy equations of state through iterative AI reasoning", "authors": ["Clecio R. Bom", "Bernardo M. Fraga", "Miguel A. Sabogal", "Armando Bernui", "Phelipe Darc", "Gustavo Schwarz"], "abstract": "Phenomenological model building has traditionally relied on human reasoning: equations are proposed from theoretical intuition, analogy, or empirical convenience, and only then tested against data. Here we show that this cycle can be recast as an iterative AI reasoning process for dynamical dark energy. Our framework uses a large language model to propose equations of state together with cosmological rationales, grounded by retrieval from the dark-energy literature and refined through autonomous evaluation. Each candidate is embedded in a cosmological model, optimized against observations, and assessed using likelihood performance and theoretical consistency. An independent language-model critic scores the physical motivation, novelty, clarity, stability and implementation validity of both", "date": "2026-06-17", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.19427v1", "pdf": "https://arxiv.org/pdf/2606.19427v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"we show that this cycle can be recast as an iterative AI reasoning process for dynamical dark energy\"."}, {"id": "arxiv:2606.18927v1", "title": "APU-Accelerated Large Eddy Simulation with the Discontinuous Galerkin Solver GALÆXI", "authors": ["Spencer Starr", "Anna Schwarz", "Justin Du Plessis", "Andreas Wanninger", "Johanna Hintz", "Rohan Kaushik"], "abstract": "The exascale computing era, driven by heterogeneous GPU architectures, requires a fundamental redesign of traditional CFD solvers to fully leverage those heterogeneous systems. The discontinuous Galerkin spectral element method (DGSEM) provides an ideal foundation for this transition due to its high-order accuracy and local computational stencil. This work presents recent advances in the development and application of the architecture-agnostic DGSEM framework GALÆXI by linking hardware optimization, software implementation, and physical validation. The performance of GALÆXI on the AMD MI300A Accelerated Processing Units (APUs) featured on the Hunter supercomputer is analyzed. Specifically, evaluations of the strong and weak scaling performance and the impact of the compute partitioning mod", "date": "2026-06-17", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.18927v1", "pdf": "https://arxiv.org/pdf/2606.18927v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The exascale computing era, driven by heterogeneous GPU architectures, requires a fundamental redesign of traditional CFD solvers to fully leverage those hetero\"."}, {"id": "arxiv:2606.22443v1", "title": "SPiralRoll: A Novel Adjustable-Stiffness Underactuated 3-DoF Joint with Torsion Springs for Rolling Robots", "authors": ["Louis Keith", "George Ripper", "and Seyed Amir Tafrishi"], "abstract": "Compliant mechanisms are important in robotics because they can improve adaptability, safety, and energy efficiency while reducing hardware complexity. This paper presents SPiralRoll, a novel torsion-spring-based underactuated compliant mechanism for rolling robots and compliant robotic actuation. The mechanism uses arc-distributed elastic members and two motor inputs to realize three physically observable output motions: rotational motion, radial expansion/contraction, and axial spin induced by nonlinear compliant deformation. Two configurations, namely full-arc and single-arc designs, are developed and experimentally evaluated. Beyond benchtop validation, the mechanism is integrated into a spherical rolling robot, where proof-of-concept experiments demonstrate forward rolling and turning", "date": "2026-06-21", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.22443v1", "pdf": "https://arxiv.org/pdf/2606.22443v1", "citations": 0, "source": יים תוך שימוש במודלים. תקציר: \"We present the first measurement of the angular two-point correlation function \\(w(θ)\\) of radio sources from the MeerKAT Large Area Synoptic Survey (MeerKLASS)\"."}, {"id": "arxiv:2606.23656v1", "title": "Causal Inference with Multiple Misclassified Exposures: A Control Variate-Adjusted Calibration Weighting Approach", "authors": ["Nandini Murali", "Keith Barnatchez", "Jordana E. Hoppe", "Brandie D. Wagner", "Kayleigh P. Keller", "Kevin P. Josey"], "abstract": "Exposure misclassification is a common concern in studies of respiratory infections in cystic fibrosis. Throat swabs are frequently used in place of expectorated or induced sputum cultures, although they have imperfect sensitivity and specificity to detect Pseudomonas aeruginosa and Staphylococcus aureus. We develop calibration weighting and control variate estimators for causal inference with multiple misclassified binary exposures and clustered observations. The calibration approach treats misclassification as a missing data problem, achieving consistency without modelling the misclassification mechanism. The control variate adjustment integrates information from error-prone observations to reduce variance while preserving the consistency of the gold-standard estimator. We show that the ", "date": "2026-06-22", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.23656v1", "pdf": "https://arxiv.org/pdf/2606.23656v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "researcher", "matched": "David Keith", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת David Keith — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Exposure misclassification is a common concern in studies of respiratory infections in cystic fibrosis\"."}, {"id": "arxiv:2606.24997v1", "title": "What's in an Earth Embedding? An Explainability Analysis of Location Encoders", "authors": ["Livia Betti", "Sebastian Ricke", "Ivica Obadic", "Adam J. Stewart", "Esther Rolf"], "abstract": "Geographic implicit neural representations (INRs) learn to map any coordinate on Earth to a location embedding, implicitly encoding geospatial data into the weights of a neural network. Location embeddings are widely used off the shelf as general-purpose geospatial representations, yet users lack principled tools to audit what geographic or semantic information these embeddings capture. In this work, we analyze the information content of geographic INRs through their location embeddings. We decompose these embeddings into human-interpretable features$\\unicode{x2014}$namely, (i) sparse latent concepts, (ii) natural language concepts, and (iii) visual features. The latent concept embeddings are learned using sparse autoencoders. To recover natural language concepts, we apply sparse linear co", "date": "2026-06-23", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.24997v1", "pdf": "https://arxiv.org/pdf/2606.24997v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "researcher", "matched": "Kate Ricke", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Kate Ricke — מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Geographic implicit neural representations (INRs) learn to map any coordinate on Earth to a location embedding, implicitly encoding geospatial data into the wei\"."}, {"id": "arxiv:2606.25537v1", "title": "Probing the Fundamental Nature of Particle Dark Matter", "authors": ["Marco Regis", "Aritra Basu", "Geoff Beck", "Gianni Bernardi", "Paolo Marchegiani", "Dominik J. Schwarz"], "abstract": "Understanding the fundamental nature of dark matter (DM) is one of the most significant scientific challenges of our time. A compelling hypothesis is that DM consists of a new, yet-to-be-discovered particle. Among the leading candidates are weakly interacting massive particles (WIMPs) and axion-like particles (ALPs), both of which can be investigated using observations with the SKA telescopes. In this chapter, we review the search for particle DM through radio observations, summarizing the current state-of-the-art and presenting forecasts for the SKA-Low and SKA-Mid telescopes in the AA4 baseline design. Radio searches for WIMPs focus on detecting synchrotron radiation originating from the products of DM annihilation using continuum observations. Competitive constraints on sub-TeV WIMPs ha", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25537v1", "pdf": "https://arxiv.org/pdf/2606.25537v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "researcher", "matched": "Joshua Schwarz", "priority": "red", "score": 3, "stardust": false, "summary_he": "🔴 מאמר חדש מאת Joshua Schwarz — מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Understanding the fundamental nature of dark matter (DM) is one of the most significant scientific challenges of our time\"."}, {"id": "arxiv:2605.28627v1", "title": "An Architecture-Agnostic High-Order Discontinuous Galerkin Framework for Compressible Flows", "authors": ["Spencer Starr", "Yannik Feldner", "Patrick Kopper", "Marcel Blind", "Daniel Kempf", "Jannik Schrempp"], "abstract": "With the recent proliferation of heterogeneous, GPU-accelerated supercomputers, high-order computational fluid dynamics (CFD) simulations of complex, turbulent flows are more accessible than ever. To leverage the computing power of these machines, CFD software must adapt. However, complicating the situation is the emerging need to support hardware from multiple GPU vendors. Addressing this need is the GPU-accelerated, discontinuous Galerkin spectral element method (DGSEM) framework GALÆXI, a high-order, open source, architecture-agnostic toolchain for the study of complex, compressible, turbulent flows on unstructured, hexahedral grids. GPU-accelerated computations with GALÆXI are possible on GPU hardware by interfacing Fortran source code to the vendor models CUDA C++ for NVIDIA and HIP C", "date": "2026-05-27", "journal": "arXiv", "url": "https://arxiv.org/abs/2605.28627v1", "pdf": "https://arxiv.org/pdf/2605.28627v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"With the recent proliferation of heterogeneous, GPU-accelerated supercomputers, high-order computational fluid dynamics (CFD) simulations of complex, turbulent \"."}, {"id": "arxiv:2606.05521v1", "title": "A Kinematic Study of Wolf-Rayet Stars at the Galactic Center I: Binary Candidates and Constraints on the Binary Fraction", "authors": ["Rory O. Bentley", "Tuan Do", "Andrea Ghez", "Devin Chu", "Anna Ciurlo", "Abhimat K. Gautam"], "abstract": "We report the binary fraction of Wolf-Rayet (WR) stars within 0.5~pc of the Galactic center obtained through the longest time-baseline (1994-2024) kinematic study of this population of stars. The new radial velocity ($v_{z}$) data we present is primarily from the W. M. Keck Observatory, with additional $v_{z}$ measurements from Gemini North Observatory. When combining our new $v_{z}$ measurements with literature measurements, we find $v_{z}$ variations suggesting the presence of a companion for five out of 27 WR stars, of which two are newly identified here (IRS~13E4, S8-181), along with three previously detected binaries (IRS~16SW, IRS~16NE, S4-258). Based on our experimental sensitivity and expected properties of the underlying population, we infer the binary fraction of the WR stars in ", "date": "2026-06-03", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.05521v1", "pdf": "https://arxiv.org/pdf/2606.05521v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש בניסויי מעבדה. מהממצאים: \"we find $v_{z}$ variations suggesting the presence of a companion for five out of 27 WR stars, of which two are newly identified here (IRS~13E4, S8-181), along with three previousl\"."}, {"id": "arxiv:2606.09890v1", "title": "PreAct-Bench: Benchmarking Predictive Monitoring in LLMs", "authors": ["Hainiu Xu", "Italo Luis da Silva", "Jiangnan Ye", "Yuhao Wang", "Wei Liu", "Linyi Yang"], "abstract": "Large language models (LLMs) are increasingly deployed as autonomous agents capable of executing multi-step action trajectories toward a given objective. While existing safety research has focused on detecting unethical behavior from complete trajectories, this paradigm is fundamentally retrospective: it identifies harm only after it has already occurred. In this work, we study a critical yet overlooked safety task, which we term Predictive Monitoring: given only a partial action trajectory, can a model infer whether it will culminate in an unethical action before the overt action is executed? To support this task, we present PreActBench, a benchmark of 1,000 paired ethical and unethical action trajectories spanning five domains. We evaluate a range of LLMs, safety guardrail models, and la", "date": "2026-06-03", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.09890v1", "pdf": "https://arxiv.org/pdf/2606.09890v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Large language models (LLMs) are increasingly deployed as autonomous agents capable of executing multi-step action trajectories toward a given objective\"."}, {"id": "arxiv:2606.07327v2", "title": "Six Open Questions in Machine-Learned Interatomic Potential Foundation Models", "authors": ["Isabel Creed", "Tim Rein", "Ingvars Vitenburgs", "Wojciech G. Stark", "Viktor Ellingsson", "Ahmed Y. Ismail"], "abstract": "Machine-learned interatomic potentials (MLIPs) have had a profound impact on molecular modelling in recent years, promising to resolve the long-standing tension between the scale and accuracy of simulations. There has been a proliferation of new models and designs, and recently the paradigm of ``foundational'' MLIPs has become prevalent. Broadly speaking, foundation models are trained on large diverse datasets and promise to work well for new systems with minimal updates required. However, in such a new and fast moving field, there are many unanswered questions. In this article, we set out to articulate and explore what we see as the most important among these questions. We start by developing a working definition for foundational MLIPs and use this definition to frame the subsequent open ", "date": "2026-06-05", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.07327v2", "pdf": "https://arxiv.org/pdf/2606.07327v2", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Machine-learned interatomic potentials (MLIPs) have had a profound impact on molecular modelling in recent years, promising to resolve the long-standing tension\"."}, {"id": "arxiv:2606.09973v1", "title": "Stellar Obliquities of Young Systems, Atmospheres Undergoing Contraction and Escape (SOYSAUCE) II: a 135 Myr planet on an aligned orbit with transit timing variations", "authors": ["Madyson G. Barber", "Andrew W. Mann", "Sydney Vach", "Leah J. Boff", "Andrew W. Boyle", "Andrew Vanderburg"], "abstract": "Young planets (<1 Gyr) provide opportunities to directly probe planet formation and evolution processes in action. However, due to heightened stellar activity, there is a lack of known transiting planets in adolescence (~100-500 Myr). Here we present the validation of TIC 150070085 b, a 3.6 R_E planet on a 10.47 day orbit, and report the candidate TIC 150070085 c, a 3.0 R_E planet on a 15.90 day orbit. While we are unable to validate the second signal, the proximity to mean motion resonance (3:2) and transit timing variations observed in the transits of TIC 150070085 b strongly suggest the signal is planetary. We confirm the host star as a member of Alessi 84 and combine the group's CMD, rotation, and variability properties to update the age to 135 +/- 10 Myr. We additionally use MAROON-X ", "date": "2026-06-08", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.09973v1", "pdf": "https://arxiv.org/pdf/2606.09973v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Young planets (<1 Gyr) provide opportunities to directly probe planet formation and evolution processes in action\"."}, {"id": "arxiv:2606.10298v1", "title": "From Context-Aware to Conflict-Aware: Generalizing Contrastive Decoding for Knowledge Conflict in LLMs", "authors": ["Runze Jiang", "Taiqiang Wu", "Yan Wang", "Bingyu Zhu", "Longtao Huang"], "abstract": "When large language models generate from retrieved or augmented contexts, conflicts between external context and parametric priors remain a central reliability bottleneck. Existing contrastive decoding methods follow a \\emph{context-aware} paradigm that unilaterally amplifies context over parametric priors, overwriting correct priors when the context is erroneous. We generalize this to the \\textbf{conflict-aware} paradigm that dynamically allocates authority between prior and context based on conflict signals, rather than presupposing context trustworthiness. We show that the affine combination of prior and context logits yields a \\textbf{power family} with an inherent \\textbf{regime asymmetry}: extrapolation amplifies errors unboundedly when the prior is correct, interpolation under-corre", "date": "2026-06-09", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.10298v1", "pdf": "https://arxiv.org/pdf/2606.10298v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"We show that the affine combination of prior and context logits yields a \\textbf{power family} with an inherent \\textbf{regime asymmetry}: extrapolation amplifies errors unboundedl\"."}, {"id": "arxiv:2606.12932v1", "title": "Conditional spinodal decomposition in Li-Mg anodes for lithium metal batteries", "authors": ["Leonardo Shoji Aota", "Aubin Leray", "Yuqi Liu", "Frederic de Geuser", "Chanwon Jung", "Shyam Katnagallu"], "abstract": "The development of batteries with high energy density, short charging times and use of sustainable materials is critical for decarbonization. Magnesium (Mg)-based anodes for lithium (Li) metal batteries promote homogeneous Li plating, thereby avoiding the formation of Li dendrites that cause short circuits and battery failure. However, microstructural modifications induced by Li-alloying and their influence on battery operation remain elusive. Here, we unveil the previously unknown formation of an ordered B2 phase, which creates a conditional spinodal decomposition with the \\b{eta}-body-centered cubic phase. Chemical fluctuations characteristic of spinodal decomposition give rise to uniformly dispersed Li-rich \\b{eta}-BCC and Li-poor B2 continuous interconnected phases, with the former pro", "date": "2026-06-11", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.12932v1", "pdf": "https://arxiv.org/pdf/2606.12932v1", "citations": 0, "source": "arXiv", "query": "au:MacMartin OR au:Schwarz OR au:Talati", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"The development of batteries with high energy density, short charging times and use of sustainable materials is critical for decarbonization\"."}, {"id": "arxiv:2606.15007v1", "title": "Nemotron 3 Ultra: Open, Efficient Mixture-of-Experts Hybrid Mamba-Transformer Model for Agentic Reasoning", "authors": [" NVIDIA", " :", "Aaron Blakeman", "Aaron Thomas", "Aastha Jhunjhunwala", "Abhibha Gupta"], "abstract": "We introduce Nemotron 3 Ultra, a 550 billion total and 55 billion active parameter Mixture-of-Experts Hybrid Mamba-Attention language model. We pre-trained Nemotron 3 Ultra on 20 trillion text tokens, then extended the context length to 1M tokens, and post-trained using Supervised Fine Tuning (SFT), Reinforcement Learning (RL), and Multi-teacher On-Policy Distillation (MOPD). Nemotron 3 Ultra is our most capable model yet, employing multiple key technologies - LatentMoE, Multi Token Prediction (MTP), NVFP4 pre-training, multi-environment RLVR, MOPD, and reasoning budget control. Nemotron 3 Ultra achieves up to ~6x higher inference throughput as compared to state-of-the-art publicly available LLMs while attaining on-par accuracy. The state-of-the-art accuracy, high inference throughput, and", "date": "2026-06-12", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.15007v1", "pdf": "https://arxiv.org/pdf/2606.15007v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"We introduce Nemotron 3 Ultra, a 550 billion total and 55 billion active parameter Mixture-of-Experts Hybrid Mamba-Attention language model\"."}, {"id": "arxiv:2606.16267v1", "title": "Dynamically suppressed lattice rotations in SrTiO$_3$ as a basis for photo-induced ferroelectricity", "authors": ["Huaiyu Hugo Wang", "Michael Fechner", "Giovanni De Vecchi", "Sylvia L. Griffitt", "Gal Orenstein", "Jade Stanton"], "abstract": "Photo-induced ferroelectricity in the quantum paraelectric SrTiO$_3$ involves the dynamical interplay between a coherently driven Ti-O stretching vibration and multiple structural degrees of freedom, including antiferrodistortive rotations, strain, and the polar mode instability. In the high-temperature cubic phase, in the absence of average antiferrodistortion, time-resolved X-ray diffuse scattering has evidenced a correlation between a photo-induced reduction in antiferrodistortive fluctuations and the emergence of ferroelectric order. Here, we complement these measurements with time-resolved elastic X-ray diffraction in the low-temperature tetragonal phase, in which antiferrodistortive fluctuations are small but a finite average rotation has set in. In this phase, we observe a long-live", "date": "2026-06-15", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.16267v1", "pdf": "https://arxiv.org/pdf/2606.16267v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Photo-induced ferroelectricity in the quantum paraelectric SrTiO$_3$ involves the dynamical interplay between a coherently driven Ti-O stretching vibration and \"."}, {"id": "arxiv:2606.20224v1", "title": "TOI-2147 b and TOI-6019 b: Two eccentric warm Jupiters detected and characterized with TESS and MaHPS", "authors": ["Luis Thomas", "Louise D. Nielsen", "Hanna Kellermann", "Bibiana Prinoth", "Yutong Liu", "Elif Zeynep Özden"], "abstract": "The population of Jupiter-sized exoplanets with orbital periods between 10 and 200 days (WJs) exhibits a broad range of orbital eccentricities and system architectures, suggesting a diversity of formation and migration pathways. In this work, we report the detection and characterization of two new eccentric WJs, TOI-2147 b and TOI-6019 b, initially identified as planet candidates by the Transiting Exoplanet Survey Satellite (TESS). We combined TESS photometry with ground-based follow-up observations, including multiband photometry from LCOGT and MuSCAT2, high-angular-resolution speckle imaging, and high-precision radial velocity measurements from the high-resolution Manfred Hirt Planet Finder Spectrograph (MaHPS). Using these data, we were able to confirm the planetary nature of both candi", "date": "2026-06-18", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.20224v1", "pdf": "https://arxiv.org/pdf/2606.20224v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש בתצפיות מרחוק. מהממצאים: \"we report the detection and characterization of two new eccentric WJs, TOI-2147 b and TOI-6019 b, initially identified as planet candidates by the Transiting Exoplanet Survey Satel\"."}, {"id": "arxiv:2606.21436v1", "title": "Pixel Watch: Robust Heart Rate Sensing from Multipath PPG and On-Device Deep Learning Trained on 10,000 hours of Free-Living and Fitness Data", "authors": ["Daniel Roggen", "Megan Walker", "Yojan Patel", "Shyam Tailor", "Dimitris Spathis", "Matt Wimmer"], "abstract": "The Pixel Watch 2 (PW2) is the first Google smartwatch to combine multipath photoplethysmography (PPG) with deep learning-based heart rate inference, designed to significantly improve sensing accuracy during motion-heavy activities. The device processes 10 optical channels using an on-device, 15-layer temporally dilated convolutional neural network (~300K parameters) to yield a 1 Hz heart rate output. Crucial to this model's performance was its training on a massive dataset comprising 10,000 hours of data from 962 participants, curated from a broader corpus of controlled and free-living activities. We evaluated the PW2's sensing performance across two independent validation sets: an in-house fitness dataset (229 participants, 250 hours) and an external free-living dataset (27 participants,", "date": "2026-06-19", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.21436v1", "pdf": "https://arxiv.org/pdf/2606.21436v1", "citations": 0, "source": "arXiv", "query": "au:Keutsch OR au:Haywood OR au:Tilmes OR au:Visioni OR au:Diamond", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The Pixel Watch 2 (PW2) is the first Google smartwatch to combine multipath photoplethysmography (PPG) with deep learning-based heart rate inference, designed t\"."}, {"id": "arxiv:2606.23014v1", "title": "When bars and spirals conspire: recurrent build-up of the nuclear regions of disc galaxies", "authors": ["Tristan Boin", "Sergey Khoperskov", "Paola Di Matteo", "Nils Hoyer", "Alessandra Mastrobuono-Battisti", "Nils Ryde"], "abstract": "The assembly history of the central regions of disc galaxies is regulated by dynamical processes that trigger gas infall events, leading to active star formation in nuclear stellar discs (NSD) and in nuclear stellar clusters (NSC). In the Milky Way, recent studies of its nuclear regions have revealed a complex star formation history (SFH), with an initial burst associated to the formation of the Galactic bar, followed by a non-constant star formation rate. In this work, we aim to study the formation and evolution of nuclear structures and their link with the formation of large-scale structures. Our goal is to investigate the effects of the bar and spiral arms on the gas dynamics and, as a result on the SFH of NSDs and NSCs. We run a simulation of an isolated Milky Way-like galaxy with the ", "date": "2026-06-22", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.23014v1", "pdf": "https://arxiv.org/pdf/2606.23014v1", "citations": 0, "source": "arXiv", "query": "au:Keutsch OR au:Haywood OR au:Tilmes OR au:Visioni OR au:Diamond", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The assembly history of the central regions of disc galaxies is regulated by dynamical processes that trigger gas infall events, leading to active star formatio\"."}, {"id": "arxiv:2606.23551v1", "title": "Observing a 542-day transiting giant with large TTVs: The 2025 transit of HIP 41378 f and new constraints on the outer system", "authors": ["Pietro Leonardi", "Alexandre Santerne", "Luca Borsato", "Salomé Grouffal", "Christopher R. Mann", "Giampaolo Piotto"], "abstract": "Characterizing long-period transiting exoplanets is inherently challenging due to the rarity and long duration of transit events. Yet, these systems provide unique insights into planetary formation, migration, the detection of exomoons, and primordial atmospheres by occupying a sparsely populated region of the exoplanet parameter space. The complexity increases further for long-period planets near mean-motion resonances, where transit timing variations (TTVs) can reach amplitudes of several hours to days. We present a coordinated space- and ground-based observing campaign, using photometry from NEOSSat, multiple LCOGT sites, MuSCAT, MuSCAT3, Tierras and NGTS, to capture the 19-hour transit of the long-period giant exoplanet HIP 41378 f ($P$ = 542 d, $R$ = 9.5 $R_{\\oplus}$) on 31 October 20", "date": "2026-06-22", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.23551v1", "pdf": "https://arxiv.org/pdf/2606.23551v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. תקציר: \"Characterizing long-period transiting exoplanets is inherently challenging due to the rarity and long duration of transit events\"."}, {"id": "arxiv:2606.24854v1", "title": "It's Complicated: On the Design and Evaluation of AI-Powered AAC Interfaces", "authors": ["Blade Frisch", "Will Wade", "Dylan Gaines", "Michelle Kinsella", "Betts Peters", "Tamara Broderick"], "abstract": "Artificial intelligence (AI) can enhance what people who use augmentative and alternative communication (AAC) are able to do with their systems. However, evaluating AI-powered AAC interfaces can be difficult. People are intersectional beings and current evaluation metrics can struggle to capture the multifaceted and nuanced desires people may have for their AAC. We explore the complicated nature of six AAC problem spaces, explore how AI might be used in these spaces, and suggest more robust methods of evaluation that take the intersectional nuances of people into account. We also discuss broader issues that arise across these problem spaces and how they could be addressed using our proposed evaluation methods.", "date": "2026-06-23", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.24854v1", "pdf": "https://arxiv.org/pdf/2606.24854v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Artificial intelligence (AI) can enhance what people who use augmentative and alternative communication (AAC) are able to do with their systems\"."}, {"id": "arxiv:2606.25955v1", "title": "Single-dish HI Intensity Mapping with the SKAO: Precursor Progress with MeerKAT's Large Area Synoptic Survey (MeerKLASS)", "authors": ["Steven Cunnington", "Jingying Wang", "Mario G. Santos", "Matilde Barberi-Squarotti", "Philip Bull", "Stefano Camera"], "abstract": "Using the SKAO to map the intensity of neutral hydrogen's 21cm emission line will be a golden opportunity to constrain models of cosmology. To access the largest cosmological scales, wide-sky surveys should ideally reach thousands of square degrees, requiring SKA-Mid's dishes to scan the sky in auto-correlation mode, so-called single-dish observations. In this chapter, we overview the latest results from MeerKAT's Large Area Synoptic Survey (MeerKLASS), which has been pioneering this single-dish observing strategy, and motivating its continuation with the SKA-Mid AA4 deployment. MeerKLASS, operating on the same Karoo site where the SKA-Mid is being built, has now achieved multiple cosmological detections from single-dish observations, including high-significance cross-correlations with opt", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25955v1", "pdf": "https://arxiv.org/pdf/2606.25955v1", "citations": 0, "source": "arXiv", "query": "au:Ricke OR au:Irvine OR au:Keith OR au:Dykema OR au:Weisenstein", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Using the SKAO to map the intensity of neutral hydrogen's 21cm emission line will be a golden opportunity to constrain models of cosmology\"."}, {"id": "arxiv:2606.26050v1", "title": "Natural Ungrokking: Asymmetric Control of Which Rules Survive Pretraining", "authors": ["Juliana Li", "Diya Sreedhar"], "abstract": "Midway through an ordinary pretraining run, a small language model learns the pronoun-gender rule: cued with a girl's name (\"Sue cried because\"), it resolves the next pronoun to she, generalizing to held-out probes (0.94 by step 925). By step 3,500 the same model scores near zero on the same probes, although the rule's evidence is still in the training data. We call this within-run reversal natural ungrokking: the corpus decides, with no trace in the loss curve, which learned rules a model keeps. Which rules survive is predictable from one corpus statistic: how often the training stream shows the rule winning. Across un-intervened runs (two corpora, three budgets, three seeds), support frequency decides a rule's fate; the data-to-parameter ratio only modulates how deeply a doomed rule fall", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26050v1", "pdf": "https://arxiv.org/pdf/2606.26050v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Midway through an ordinary pretraining run, a small language model learns the pronoun-gender rule: cued with a girl's name (\"Sue cried because\"), it resolves th\"."}, {"id": "arxiv:2606.26017v1", "title": "G2DP: Diffusion Planning with Spatio-Temporal Grid Guidance", "authors": ["Hang Yu", "Ye Jin", "Alessandro Canevaro", "Julian Schmidt", "Julian Jordan", "Peizheng Li"], "abstract": "In autonomous driving, diffusion-based planners have emerged as a promising paradigm for robust motion planning in dense and interactive traffic, as they can effectively model diverse driving behaviors. However, their inherent stochasticity often requires explicit guidance during denoising to ensure safety and route adherence for robust closed-loop execution. Existing guidance typically relies on sparse, entity-centric geometric queries or post-hoc refinement, yielding limited situational awareness and fragile performance in interactive scenes. To address this issue, we propose G2DP (Grid-Guided Diffusion Planning), a diffusion-based planner that directly enforces dense environmental constraints through inference-time guidance. Specifically, G2DP constructs a differentiable spatio-temporal", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26017v1", "pdf": "https://arxiv.org/pdf/2606.26017v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"In autonomous driving, diffusion-based planners have emerged as a promising paradigm for robust motion planning in dense and interactive traffic, as they can ef\"."}, {"id": "arxiv:2606.25987v1", "title": "Weave of Formal Thought", "authors": ["Alexandre Bouayad"], "abstract": "Large language models (LLMs) attain remarkable surface fluency on code, yet they neither formally guarantee the syntactic validity of their output nor leverage the hierarchical structure defining the target language. While existing constrained-decoding frameworks address the former, they operate under rigid assumptions that preclude critical lexical mechanisms -- including context-sensitive lexing, maximal-munch tokenization, and keyword extraction -- and only approximate vocabulary masking, sacrificing completeness. For the latter, code LLMs typically inject grammatical structure via predetermined policies rather than learning which structural information to expose. In this work, we introduce Weave of Formal Thought (WoFT), a paradigm uniting rigorous syntactic validation with learned str", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25987v1", "pdf": "https://arxiv.org/pdf/2606.25987v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Large language models (LLMs) attain remarkable surface fluency on code, yet they neither formally guarantee the syntactic validity of their output nor leverage \"."}, {"id": "arxiv:2606.25882v1", "title": "An Analysis of Posterior Collapse, Parameterization and Initialization in Variational Deep Gaussian Processes", "authors": ["Francisco Javier Sáez-Maldonado", "Juan Maroñas", "Daniel Hernández-Lobato"], "abstract": "DGPs are probabilistic models with remarkable prediction performance that concatenate GPs across several layers. Exact inference in DGPs is intractable, and variational inference is often used to approximate the posterior with a parametric distribution tuned by minimizing the Kullback-Leibler divergence. Moreover, finding a good VI approximation is challenging. In particular, a problem of VI is posterior collapse, where VI converges to a variational posterior that matches the prior. In variational DGPs, this implies explaining the data as noise. This work studies posterior collapse in DGPs and identifies its connection to the DSVI algorithm and the widely used linear prior mean function employed in all but the last layer. We show that the benefit of the linear prior mean does not arise fro", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25882v1", "pdf": "https://arxiv.org/pdf/2606.25882v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. מהממצאים: \"We show that the benefit of the linear prior mean does not arise fro\"."}, {"id": "arxiv:2606.25865v1", "title": "Molexar: A Unified Multimodal Molecular Foundation Model for Drug Design", "authors": ["Haoyu Lin", "Yiyan Liao", "Jinmei Pan", "Xinliao Ling", "Luhua Lai", "Jianfeng Pei"], "abstract": "Molecular generation is a central challenge in drug discovery, requiring models that explore vast chemical space while satisfying diverse design constraints. We present Molexar, a unified multimodal molecular foundation model built on Fragment-SELFIES, a robust, fragment-aware molecular language with validity-preserving decoding and explicit fragment structure. A pretrained autoregressive decoder learns the Fragment-SELFIES syntax and molecular distribution; supervised fine-tuning (SFT) then trains the same decoder on condition-molecule pairs spanning scalar molecular properties, pharmacophore fingerprints, protein sequences, and binding pockets, injecting each condition by in-place replacement of value-token embeddings so that all generation modes share one autoregressive path. Molexar ac", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25865v1", "pdf": "https://arxiv.org/pdf/2606.25865v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Molecular generation is a central challenge in drug discovery, requiring models that explore vast chemical space while satisfying diverse design constraints\"."}, {"id": "arxiv:2606.25858v1", "title": "Color Matters: Trigger Color Affects Success in Federated Backdoor Attacks", "authors": ["Kavindu Herath", "Joshua C. Zhao", "Saurabh Bagchi"], "abstract": "Federated learning is vulnerable to backdoor attacks in which malicious clients inject poisoned updates while preserving benign-task performance. In this paper, we study a semantics-driven backdoor mechanism in which attackers use natural visual accessories as triggers and manipulate only the trigger color while keeping the attack pipeline fixed. Our framework considers semantic trigger objects such as masks and sunglasses, instantiated in black and white variants, and evaluates their effect in a controlled federated learning setting. Malicious clients construct poisoned samples by applying a trigger to source-class images and relabeling them to an attacker-chosen target class, while benign clients train only on clean data. We analyze this mechanism under both a standard poisoning objectiv", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25858v1", "pdf": "https://arxiv.org/pdf/2606.25858v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Federated learning is vulnerable to backdoor attacks in which malicious clients inject poisoned updates while preserving benign-task performance\"."}, {"id": "arxiv:2606.25836v1", "title": "AI Snitches Get Glitches: Towards Evading Agentic Surveillance", "authors": ["Hyejun Jeong", "Dzung Pham", "Amir Houmansadr", "Eugene Bagdasarian"], "abstract": "To better assist users with completing challenging tasks, AI agents mediate communications, access data, and interact with different APIs. Many employers (and even nation-states) already provide their users with this technology. However, widespread adoption of AI agents creates a new risk to abuse access to user data for another goal: surveilling users. These users might not even have the ability or permission to control the actions and data accesses of the surveilling agents. We introduce and formalize the problem of agentic surveillance: the ability of an AI agent to analyze available information, craft a report, and send it out using available tools. To evaluate surveillance capabilities across different models, we create SurveilBench, a dataset of various reporting scenarios focusing o", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25836v1", "pdf": "https://arxiv.org/pdf/2606.25836v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"To better assist users with completing challenging tasks, AI agents mediate communications, access data, and interact with different APIs\"."}, {"id": "arxiv:2606.25819v1", "title": "Beyond Function Calling: Benchmarking Tool-Using Agents under Tool-Environment Unreliability", "authors": ["Yang Tian", "Zhengpeng Shi", "Bo Zhao"], "abstract": "Large language models are increasingly deployed as agents that solve tasks by interacting with external tool environments. Although recent tool-use benchmarks increasingly cover complex task settings, they still largely assume clean, stable, and trustworthy tool environments, leaving tool-environment unreliability insufficiently examined. We introduce ToolBench-X, a benchmark for evaluating agents under recoverable reliability hazards. ToolBench-X contains executable multi-step tasks across diverse domains and sequential, parallel, and mixed workflows, each paired with deterministic tools and a canonical final answer for automatic evaluation. Starting from clean tool environments, ToolBench-X injects five structured hazard types: Specification Drift, Invocation Error, Execution Failure, Ou", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25819v1", "pdf": "https://arxiv.org/pdf/2606.25819v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Large language models are increasingly deployed as agents that solve tasks by interacting with external tool environments\"."}, {"id": "arxiv:2606.25784v1", "title": "$S^{2}$-FracMix: Label-Preserving Self-Saliency Mixup Augmentation", "authors": ["Khawar Islam", "Arif Mahmood", "Xin Jin", "Naveed Akhtar"], "abstract": "Data augmentation is known to improve generalization of deep visual models. Recent methods favor mixup strategies that generate interpolated samples to improve model performance. However, these techniques not only incur significant computational overhead, they also lead to semantic disruption of augmentation data due to cross-sample mixing. We first propose Self-Saliency ($S^2$) Mixup, which constructs challenging yet label-consistent samples by extracting multi-scale salient patches and reinserting them into non-salient regions of the same image. This promotes scale-invariant feature learning while avoiding cross-sample interference. To further enhance model robustness, we introduce FracMix, a mixing scheme that injects self-similarity patterns into salient regions using adaptive ratios. ", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25784v1", "pdf": "https://arxiv.org/pdf/2606.25784v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Data augmentation is known to improve generalization of deep visual models\"."}, {"id": "arxiv:2606.25702v1", "title": "DANTE: A Reference-Guided Unsupervised Pipeline for Extended-Transient Anomaly Characterization in LIGO O4a", "authors": ["Luca Cirfeta"], "abstract": "The analysis of gravitational-wave detector data during the fourth observing run (O4) requires robust methods to distinguish stationary instrumental noise from non-stationary transients (glitches). In this work, we present DANTE (Domain-Adaptive Network for Transient Evaluation), a pipeline designed to discover and triage novel non-stationary artifacts entirely without labels. We demonstrate that adapting a pre-trained Vision Transformer (DINOv2) to extract local patch embeddings from time-frequency spectrograms allows for high-resolution mapping of transient anomalies. We formalize the Signal Dilution Barrier via controlled injection tests, showing that while Multiple Instance Learning (MIL) Top-k pooling recovers extended topologies, it is blind to sub-second morphologies. To address sma", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25702v1", "pdf": "https://arxiv.org/pdf/2606.25702v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במדידות ותצפיות. מהממצאים: \"We demonstrate that adapting a pre-trained Vision Transformer (DINOv2) to extract local patch embeddings from time-frequency spectrograms allows for high-resolution mapping of tran\"."}, {"id": "arxiv:2606.25701v1", "title": "Falcon: Functional Assembly and Language for Compositional Reasoning in X-ray", "authors": ["Yonathan Michael", "Mohamad Alansari", "Natnael Takele", "Andreas Henschel", "Naoufel Werghi"], "abstract": "Conventional vision-language models are largely object-centric, focusing on detecting and describing individual entities. In safety-critical X-ray baggage screening, however, threat often emerges not from a single object but from the functional compatibility of spatially dispersed components, such as batteries, detonators, and explosive charges. We formalize this setting as \\emph{compositional threat reasoning}, where risk is modeled as a relational property of grounded regions rather than an independent detection outcome. We introduce \\textbf{Falcon}, a multimodal framework that abstracts segmentation-aware region features into a structured safety state capturing component presence, pairwise functional compatibility, and scene-level risk. This structured representation is injected into th", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25701v1", "pdf": "https://arxiv.org/pdf/2606.25701v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Conventional vision-language models are largely object-centric, focusing on detecting and describing individual entities\"."}, {"id": "arxiv:2606.25589v1", "title": "Leaking Circuit Secrets: Gradient Leakage Attacks on Graph Neural Networks", "authors": ["Rupesh Raj Karn", "Johann Knechtel", "Ozgur Sinanoglu"], "abstract": "As graph neural networks (GNNs) become standard tools for critical tasks in circuit design and analysis, their security and privacy risks require careful attention. Here, we present the first comprehensive evaluation of gradient leakage attacks (GLAs) on GNNs in circuit-design and hardware-security tasks, a practical threat that has been largely overlooked. We assess state-of-the-art (SOTA) GNNs, including GraphSAGE, GCN, GIN, and GAT, trained on standard netlist benchmarks (ISCAS'85, EPFL, and TrustHub), for their fundamental vulnerability to GLAs. We find that GLAs can expose sensitive information, such as gate types and distinctive properties of hardware Trojans, which may assist adversaries in analyzing logic locking schemes or evading Trojan detection mechanisms. Our analysis shows th", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25589v1", "pdf": "https://arxiv.org/pdf/2606.25589v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. מהממצאים: \"We find that GLAs can expose sensitive information, such as gate types and distinctive properties of hardware Trojans, which may assist adversaries in analyzing logic locking schem\"."}, {"id": "arxiv:2606.25508v1", "title": "C2RM-Seg: Causal Counterfactual Reasoning with Structural-Semantic Priors for Weakly Supervised Histopathological Tissue Segmentation", "authors": ["Hualong Zhang", "Siyang Feng", "Zihan Huan", "Yi Qian", "Zhenbing Liu", "Rushi Lan"], "abstract": "Histopathological tissue segmentation is essential for computer-aided diagnosis, yet weakly supervised methods often suffer from noisy pseudo-labels generated by Class Activation Mapping (CAM). Existing CAM approaches tend to focus on staining-driven appearance cues rather than true causal tissue morphology, resulting in spurious localization and poor structural consistency. To address this issue, we propose C$^2$RM-Seg, a two-stage framework that integrates causal pseudo-label refinement with structure-aware semantic enhancement. For classification, we introduce a Causal Counterfactual Reasoning Module (C$^2$RM) that decomposes features into latent factors and performs counterfactual intervention via a learned causal structure matrix, suppressing confounding context and producing morpholo", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25508v1", "pdf": "https://arxiv.org/pdf/2606.25508v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Histopathological tissue segmentation is essential for computer-aided diagnosis, yet weakly supervised methods often suffer from noisy pseudo-labels generated b\"."}, {"id": "arxiv:2606.25487v1", "title": "How Reliable Is Your Jailbreak Judge? Calibration and Adversarial Robustness of Automated ASR Scoring", "authors": ["Yang Gao"], "abstract": "Almost every paper on LLM jailbreaks and prompt injection reports an attack-success rate (ASR), and that number is assigned not by people but by an automated judge: either a safety classifier trained for the task, or a general chat model prompted to grade. The judge is rarely checked. We check it. Using 596 human-labeled completions from the HarmBench classifier validation set, we compare the two judge families against human majority votes and then attack them. The two families fail in opposite ways. The dedicated classifier over-flags (precision 0.835, recall 0.974); three different LLM-as-judges keep high precision (0.81 to 0.94) but show erratic recall (0.06 to 0.65), so the same responses produce very different ASR depending on which judge scores them. The two families also differ shar", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25487v1", "pdf": "https://arxiv.org/pdf/2606.25487v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Almost every paper on LLM jailbreaks and prompt injection reports an attack-success rate (ASR), and that number is assigned not by people but by an automated ju\"."}, {"id": "arxiv:2606.25403v1", "title": "CrossAccent-TTS: Cross-Lingual Accent-Intensity Controllable Text-to-Speech via Disentangled Speaker and Accent Representations", "authors": ["Ram Annamdevula", "Ankit Tatawat", "Ashishkumar P. Gudmalwar", "Nirmesh J. Shah", "Pankaj Wasnik"], "abstract": "Accent conversion and controllability remain fundamental challenges in cross-lingual text-to-speech (TTS), particularly for low-resource and phonetically diverse Indic languages. While recent large language model (LLM)-based TTS systems exhibit strong cross-lingual generalization, they provide limited explicit control over accent characteristics and intensity. In this paper, we propose CrossAccentTTS, a framework that enables both accent control and conversion while preserving speaker identity. Specifically, we introduce an Accent Intensity Controller (AIC) that injects weighted language embeddings into the accent subspace, allowing smooth interpolation between accents and fine-grained modulation of accent strength at inference time. Experiments on the Indic Multilingual and L2-arctic data", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25403v1", "pdf": "https://arxiv.org/pdf/2606.25403v1", "citations": 0, "source": "arXiv", "query": "all:stratospheric aerosol injection", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Accent conversion and controllability remain fundamental challenges in cross-lingual text-to-speech (TTS), particularly for low-resource and phonetically divers\"."}, {"id": "arxiv:2606.26042v1", "title": "Paleomagnetic signatures of core-mantle interactions inferred from top-heavy thermochemical geodynamo simulations", "authors": ["Souvik Naskar", "Jonathan E. Mound", "Christopher J. Davies", "Hannah F. Rogers", "Stephen J. Mason", "Andrew T. Clarke"], "abstract": "The time-averaged geomagnetic field provides crucial insights into deep Earth dynamics and thermal core-mantle interactions. Paleomagnetic observations and numerical dynamo simulations are equivocal regarding the longitudinal structure of the time-averaged field, though the latter have often considered a generic buoyancy source, which may obscure distinct signatures of thermal and chemical buoyancy that arise near the equator and poles, respectively. In this study, we present a new suite of top-heavy geodynamo simulations, varying the relative strengths of thermal and chemical driving and comparing the resultant magnetic signatures to observational field models spanning centuries to tens of thousands of years. None of the spatially-averaged measures of field morphology and variability we t", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26042v1", "pdf": "https://arxiv.org/pdf/2606.26042v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The time-averaged geomagnetic field provides crucial insights into deep Earth dynamics and thermal core-mantle interactions\"."}, {"id": "arxiv:2606.26037v1", "title": "FedReLa: Imbalanced Federated Learning via Re-Labeling", "authors": ["Guangzheng Hu", "Patricia Menéndez", "Feng Liu", "Mingming Gong", "Guanghui Wang", "Liuhua Peng"], "abstract": "Federated learning has emerged as the foremost approach for decentralized model training with privacy preservation. The global class imbalance and cross-client data heterogeneity naturally coexist, and the mismatch between local and global imbalances exacerbates the performance degradation of the aggregated model. The agnosticism of global class distribution poses significant challenges for data-level methods, especially under extreme conditions with severe class absence across clients. In this paper, we propose FedReLa, a novel data-level approach that tackles the coexistence of data heterogeneity and class imbalance in federated learning. By re-labeling samples with a feature-dependent label re-allocator, FedReLa corrects biased global decision boundaries without requiring knowledge of t", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.26037v1", "pdf": "https://arxiv.org/pdf/2606.26037v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"Federated learning has emerged as the foremost approach for decentralized model training with privacy preservation\"."}, {"id": "arxiv:2606.25962v1", "title": "A Benchmark for Heterogeneous Stereo Deblurring with Physically- and Epipolar-constrained Cross Attention", "authors": ["Hoju Shin", "Jiah Kim", "Seung-Wook Kim", "Seowon Ji"], "abstract": "Modern stereo-capable smartphones enable immersive XR content capture. However, hardware heterogeneity across camera modules often causes severe asymmetric blur artifacts. Existing methods and benchmarks largely assume homogeneous stereo setups and therefore do not explicitly address such asymmetric degradation. To bridge this gap, we present a dedicated framework for heterogeneous stereo deblurring. First, we introduce the heterogeneous stereo deblurring (HSD) dataset, constructed from real smartphone stereo captures via multi-frame integration. Second, we propose physically- and epipolar-constrained cross attention (PECA), a lightweight module that restricts cross-view matching to an epipolar search window bounded by a optics-derived disparity upper bound. By enforcing physically valid d", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25962v1", "pdf": "https://arxiv.org/pdf/2606.25962v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Modern stereo-capable smartphones enable immersive XR content capture\"."}, {"id": "arxiv:2606.25921v1", "title": "Exact Solution of Granovetter's Threshold Model for a Finite Population", "authors": ["José F. Fontanari"], "abstract": "The Granovetter threshold model formalizes collective behavior by assuming that individual agents face a binary decision to join a movement, doing so only when the number of already active participants reaches or exceeds an intrinsic, personal threshold. In this work, we derive an exact analytical expression for the probability that a cascade halts with precisely $k$ active agents in a finite population of size $N$ triggered by a single initial instigator, and use this result to obtain the scaling corrections that govern the system near its critical boundaries. By parameterizing individual threshold heterogeneity via a Beta distribution with shape parameters $α$ and $β$, we map how these micro-level predispositions aggregate into macro-level collective outcomes. Here, a small $α$ represent", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25921v1", "pdf": "https://arxiv.org/pdf/2606.25921v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"The Granovetter threshold model formalizes collective behavior by assuming that individual agents face a binary decision to join a movement, doing so only when \"."}, {"id": "arxiv:2606.25880v1", "title": "USS: Unified Spatial-Semantic Prompts for Embodied Visual Tracking with Latent Dynamics Learning", "authors": ["Yuchen Xie", "Xinyu Zhou", "Kuangji Zuo", "Yanshuo Lu", "Fengrui Huang", "Boyu Ma"], "abstract": "Embodied Visual Tracking (EVT) requires an agent to continuously follow a specified target while actively moving through dynamic environments. However, prevailing EVT paradigms predominantly rely on language-based target indication. While language is expressive and convenient, cluttered scenes often contain multiple objects that satisfy the same semantic description, leading to ambiguous target grounding. We therefore propose a paradigm shift, reframing target indication in EVT from text-only specification to unified spatial-semantic prompting. Based on this paradigm, we introduce Unified Spatial-Semantic Prompts for Embodied Visual Tracking with Latent Dynamics Learning, USS, an end-to-end embodied tracking framework that supports text, point, bounding box, and mask prompts within a unifi", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25880v1", "pdf": "https://arxiv.org/pdf/2606.25880v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Embodied Visual Tracking (EVT) requires an agent to continuously follow a specified target while actively moving through dynamic environments\"."}, {"id": "arxiv:2606.25874v1", "title": "Topology-Dependent Emergence of Polychronous Neuronal Groups: A Recurrence-Plot Characterization", "authors": ["Lucas A. T. X. Carneiro", "Armand D. Jiofack", "Fernando F. Ferreira"], "abstract": "Polychronous Neuronal Groups (PNGs) reproducible, time-locked spatiotemporal firing cascades stabilised by Spike-Timing-Dependent Plasticity (STDP) and heterogeneous axonal delays provide a combinatorially rich substrate for neural computation whose structural determinants remain poorly understood. We simulate a recurrent network of N=1000 Izhikevich neurons over ten hours of biological time and identify 1545 unique PNGs via an offline event-driven detection algorithm. A parametric Watts-Strogatz topology sweep reveals that the clusteringcoefficient C is the primary structural driver of PNG yield: the transition from a ring-lattice (C~0.35, $\\sim\\!850$ \\PNGs) to a random graph (C~!0.20$, $<\\!50$ \\PNGs) reduces representational capacity by more than 90%. We further introduce a sparse-dot-pr", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25874v1", "pdf": "https://arxiv.org/pdf/2606.25874v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"Polychronous Neuronal Groups (PNGs) reproducible, time-locked spatiotemporal firing cascades stabilised by Spike-Timing-Dependent Plasticity (STDP) and heteroge\"."}, {"id": "arxiv:2606.25844v1", "title": "Naturalness Predicts but Does Not Cause Transferability in Image Encodings of Real-World Streams", "authors": ["Faruk Alpay", "Baris Basaran"], "abstract": "A common practice converts a one-dimensional signal into an image so that a vision backbone pretrained on natural photographs can be reused for recognition, yet the encoded image is rarely examined. We ask how the visual naturalness of an encoded image relates to its transfer accuracy under a frozen backbone. We build WorldStream, a corpus of 299 heterogeneous current-value series from key-free public APIs (weather, air quality, earthquakes, gold and oil, equities, crypto, foreign exchange, web activity and space weather), with a nine-way source-recognition task over 3143 temporally split windows. Across seven encodings and six frozen backbones, the Frechet distance of an encoding to natural images (FID) predicts its accuracy: Spearman $ρ=-0.72$. Two controlled interventions show this is n", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25844v1", "pdf": "https://arxiv.org/pdf/2606.25844v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים. תקציר: \"A common practice converts a one-dimensional signal into an image so that a vision backbone pretrained on natural photographs can be reused for recognition, yet\"."}, {"id": "arxiv:2606.25835v1", "title": "Multi-fidelity methods for kinetic models of epidemic dynamics with uncertain contact structure", "authors": ["Liu Liu", "Andrea Medaglia", "Hao Xie", "Mattia Zanella"], "abstract": "In this work, we develop a multi-fidelity strategy for kinetic models in epidemiology with uncertain contact dynamics. Assessing and controlling the population-level effects of contact dynamics requires the development of models for understanding observable effects of heterogeneous contact structures, whose formation depends on complex social phenomena. These can be captured taking into account high-dimensional uncertain quantities. The proposed approach combines high-fidelity kinetic solvers with a hierarchy of low-fidelity surrogates, including reduced macroscopic models and coarse kinetic descriptions, remaining applicable even in regimes where a macroscopic closure is unavailable. This hierarchical framework identifies representative parameter samples and reconstructs full solutions vi", "date": "2026-06-24", "journal": "arXiv", "url": "https://arxiv.org/abs/2606.25835v1", "pdf": "https://arxiv.org/pdf/2606.25835v1", "citations": 0, "source": "arXiv", "query": "all:heterogeneous uptake silica", "status": "general", "matched": "", "priority": "yellow", "score": 1, "stardust": false, "summary_he": "מחקר זה עוסק באירוסולים אטמוספריים תוך שימוש במודלים. תקציר: \"In this work, we develop a multi-fidelity strategy for kinetic models in epidemiology with uncertain contact dynamics\"."}, {"id": "arxiv:2606.25820v1", "title": "Operator Learning on the Data-Driven Multiscale Space for Nonlinear Flow in Random Heterogeneous Porous Media", "authors": ["Maria Vasilyeva", "Raphael Pangilinan"], "abstract": "We present an operator learning framework based on a coarse data-driven multiscale space for nonlinear flow in random heterogeneous porous media. The multiscale space is constructed from local representative fine-scale solution snapshots, yielding an accurate low-dimensional representation of the solution manifold. This multiscale basis serves as the trunk of a neural operator, while a branch network predicts the corresponding reduced coefficients from the input permeability field. Unlike Galerkin projection methods, the neural operator learns a global nonlinear mapping from permeability fields to solution coefficients, providing greater flexib
